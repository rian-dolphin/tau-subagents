[build-system]
requires = ["uv_build>=0.11.26,<0.12"]
build-backend = "uv_build"

[project]
name = "tau-subagents"
version = "0.1.0"
description = "Subagents extension for Tau (a port of pi-subagents)."
requires-python = ">=3.14"
dependencies = ["tau-ai"]

[dependency-groups]
dev = ["pytest>=8.0"]

# Tau extension manifest (tau branch `extension-manifest`, ported from pi's
# package.json "pi.extensions"): lets `tau -x` on this repo root find the
# entry inside the src layout, no root shim needed.
[tool.tau]
extensions = ["src/tau_subagents/extension.py"]

# Tau is unpublished; resolve it from the local integration worktree (the
# subagents-integration branch — the full seam stack). If the worktree is
# gone, check out subagents-integration anywhere and point this at it.
[tool.uv.sources]
tau-ai = { path = "/Users/rian/.herdr/worktrees/tau/worktree-extensions", editable = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
